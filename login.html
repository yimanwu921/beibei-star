<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<title>
贝贝的星球登录
</title>


<style>

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(#020111,#102b5c);

font-family:"Microsoft YaHei";

}


.login{

background:white;

padding:40px;

border-radius:30px;

text-align:center;

width:350px;

box-shadow:0 0 30px white;

}


input{

width:90%;

padding:12px;

margin:10px;

border-radius:20px;

border:1px solid #ccc;

}


button{

width:90%;

padding:12px;

border:none;

border-radius:20px;

background:#ffd86b;

font-size:18px;

cursor:pointer;

}

.welcome{


position:fixed;

width:100%;

height:100vh;


background:

radial-gradient(circle,#1d3b70,#020111);


display:flex;

flex-direction:column;

justify-content:center;

align-items:center;


color:white;


animation:

fade 3s;


}



.welcome h1{


font-size:40px;


text-shadow:

0 0 30px white;


animation:

glow 2s infinite;


}



.welcome p{


margin-top:20px;

font-size:20px;


}



.stars{


font-size:50px;


animation:

floatStar 2s infinite;


}



@keyframes fade{


from{

opacity:0;

}


to{

opacity:1;

}


}



@keyframes glow{


50%{

text-shadow:

0 0 50px #ffd86b;

}


}



@keyframes floatStar{


50%{

transform:

translateY(-30px);


}


}
</style>

</head>


<body>


<div class="login">


<h1>
🌹 贝贝的小星球
</h1>


<p>
请输入专属账号密码
</p>



<input 
id="username"
placeholder="账号">


<input 
id="password"
type="password"
placeholder="密码">



<button onclick="login()">

进入星球 ✨

</button>


</div>




<script>


function login(){


let username=
document.getElementById("username").value;


let password=
document.getElementById("password").value;



// 设置唯一账号密码

if(username=="beibei" 
&& 
password=="1392010"){



//保存登录状态

sessionStorage.setItem(
"login",
"yes"
);



alert("欢迎来到贝贝的小宇宙 ❤️");


//跳转主页
showEnter();


}


else{


alert("账号或密码错误 ❌");


}



}
function showEnter(){


document.body.innerHTML=`

<div class="welcome">

<div class="stars">
✨　⭐　🌙　✨
</div>


<h1>
欢迎来到贝贝的小宇宙 🌹
</h1>


<p>
正在打开专属星球...
</p>


</div>

`;


setTimeout(()=>{


window.location.href="index.html";


},3000);



}

</script>



</body>

</html>
