<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<title>
贝贝的星球登录
</title>


<style>

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(#020111,#102b5c);

font-family:"Microsoft YaHei";

}


.login{

background:white;

padding:40px;

border-radius:30px;

text-align:center;

width:350px;

box-shadow:0 0 30px white;

}


input{

width:90%;

padding:12px;

margin:10px;

border-radius:20px;

border:1px solid #ccc;

}


button{

width:90%;

padding:12px;

border:none;

border-radius:20px;

background:#ffd86b;

font-size:18px;

cursor:pointer;

}


</style>

</head>


<body>


<div class="login">


<h1>
🌹 贝贝的小星球
</h1>


<p>
请输入专属账号密码
</p>



<input 
id="username"
placeholder="账号">


<input 
id="password"
type="password"
placeholder="密码">



<button onclick="login()">

进入星球 ✨

</button>


</div>




<script>


function login(){


let username=
document.getElementById("username").value;


let password=
document.getElementById("password").value;



// 设置唯一账号密码

if(username=="beibei" 
&& 
password=="5201314"){



//保存登录状态

sessionStorage.setItem(
"login",
"yes"
);



alert("欢迎来到贝贝的小宇宙 ❤️");


//跳转主页

window.location.href="index.html";

else{


alert("账号或密码错误 ❌");


}



}


</script>



</body>

</html>
